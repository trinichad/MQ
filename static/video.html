<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Charlock — Video</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
  html, body { background:#000; margin:0; padding:0; height:100%; overflow:hidden; cursor:none; }
  .vid {
    position:fixed; inset:0;
    width:100vw; height:100vh;
    object-fit:contain; background:#000;
    opacity:0;
    transition: opacity 120ms linear;
  }
  .vid.active { opacity:1; z-index:1; }
  .vid.idle   { opacity:0; z-index:0; }
  #status { position:fixed; bottom:6px; right:10px; color:#333; font:11px monospace; }
  #logo-screen {
    position:fixed; inset:0; display:none;
    z-index: 10;
    align-items:center; justify-content:center; flex-direction:column;
    background: radial-gradient(ellipse at center, #1a0d3a 0%, #05010f 70%, #000 100%);
    color:#f4d77a; font-family: 'Cinzel', 'Trajan Pro', Georgia, serif;
    text-align:center;
  }
  #logo-screen.show { display:flex; }
  #logo-screen .magi { font-size: 9vw; font-style: italic; font-weight: 700;
    background: linear-gradient(180deg, #ffe9a8 0%, #d4a23a 50%, #8a5a18 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 40px rgba(212,162,58,0.35);
    letter-spacing: 0.04em;
    line-height: 1;
  }
  #logo-screen .quest { font-size: 9vw; font-weight: 400;
    color:#e7e2cc; letter-spacing: 0.18em; margin-top: -1vw;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    line-height: 1;
  }
  #logo-screen .tag { margin-top: 2.5vw; font-size: 1.4vw; color:#a89b6a;
    letter-spacing:0.5em; text-transform:uppercase;
  }
</style>
</head>
<body>
  <!-- Double-buffered players. We always keep the previously-shown clip
       on screen (frozen on its last frame) while the next clip loads into
       the hidden buffer. Once the incoming buffer fires `playing` we swap
       which one is active. This hides the brief tear-down of the Pi's
       hardware video overlay plane that would otherwise flash white. -->
  <video id="vidA" class="vid active" autoplay muted playsinline></video>
  <video id="vidB" class="vid idle"           muted playsinline></video>
  <div id="logo-screen" class="show">
    <div class="magi">MagiQuest</div>
    <div class="quest">ENCOUNTERS</div>
    <div class="tag">choose your adventure</div>
  </div>
  <div id="status">video screen</div>

  <script src="/static/js/socket.io.min.js"></script>
  <script>
    // The video page is a dumb client. It only:
    //   - plays whatever video the UI tells it to play
    //   - reports when the current clip ends
    //
    // Important: <video> autoplay is unmuted on a kiosk display, but most
    // browsers require the page itself to load with `muted` attribute first
    // and then we unmute on first interaction or after socket connect.

    const vidA   = document.getElementById('vidA');
    const vidB   = document.getElementById('vidB');
    const status = document.getElementById('status');
    const logo   = document.getElementById('logo-screen');
    const MENU_SENTINEL = '__menu__';

    // Currently-visible buffer. The other one is used to preload + warm up
    // the next clip before we swap which is on top.
    let active = vidA;
    let idleBuf = vidB;

    // Wire `ended` once on each buffer; only the active one's `ended` should
    // notify the UI (the idle one might fire ended while seeking/loading).
    function onEnded(buf) {
      return () => {
        if (buf !== active) return;
        socket.emit('video_ended', { src: buf.src });
      };
    }
    vidA.addEventListener('ended', onEnded(vidA));
    vidB.addEventListener('ended', onEnded(vidB));

    // ---------------- preload ----------------
    //
    // Warm the browser's HTTP cache for every clip the UI might ask us to
    // play. We use fetch() rather than a pool of <video preload="auto">
    // elements because Chromium (especially on the Pi) caps the number of
    // simultaneously-loaded media elements — pushing past that cap silently
    // breaks playback of the visible <video>. Since /clips and /videos are
    // served with Cache-Control: max-age=1 week, a fetched-and-discarded
    // response stays in the disk cache and subsequent plays are instant.
    //
    // Small concurrency limit so we don't saturate the Pi's network/disk.

    const PRELOAD_CONCURRENCY = 2;

    async function warmOne(url) {
      try {
        const r = await fetch(url, { cache: 'force-cache' });
        // Drain the body so the response actually lands in the HTTP cache.
        if (r.body && r.body.getReader) {
          const reader = r.body.getReader();
          // eslint-disable-next-line no-constant-condition
          while (true) {
            const { done } = await reader.read();
            if (done) break;
          }
        } else {
          await r.arrayBuffer();
        }
      } catch (e) {
        console.warn('preload: failed', url, e);
      }
    }

    async function preloadAll() {
      let manifest;
      try {
        const r = await fetch('/manifest', { cache: 'no-store' });
        manifest = await r.json();
      } catch (e) {
        console.warn('preload: manifest fetch failed', e);
        return;
      }
      const clips = (manifest && manifest.clips) || [];
      status.textContent = 'video screen — preloading 0/' + clips.length;

      let done = 0;
      const queue = clips.slice();
      async function worker() {
        while (queue.length) {
          const c = queue.shift();
          await warmOne(c.url);
          done++;
          status.textContent =
            'video screen — preloading ' + done + '/' + clips.length;
        }
      }
      const workers = [];
      for (let i = 0; i < PRELOAD_CONCURRENCY; i++) workers.push(worker());
      await Promise.all(workers);
      status.textContent = 'video screen — ready (' + clips.length + ' clips)';
      console.log('[preload] complete:', clips.length, 'clips');
    }

    function showLogo() {
      logo.classList.add('show');
      // Pause both buffers but keep their last frames around; the logo
      // overlay sits above them, so any residual content is hidden anyway.
      try { vidA.pause(); } catch(_) {}
      try { vidB.pause(); } catch(_) {}
    }
    function hideLogo() { logo.classList.remove('show'); }

    // Start on the logo screen until UI tells us otherwise.
    showLogo();

    // Kick off background preload of every clip.
    preloadAll();

    const socket = io();

    socket.on('connect', () => {
      status.textContent = 'video screen — connected';
    });
    socket.on('disconnect', () => {
      status.textContent = 'video screen — disconnected';
    });

    socket.on('change_video', (data) => {
      const src = data && data.src;
      if (!src || src === MENU_SENTINEL) { showLogo(); return; }
      hideLogo();
      playOnIdleBuffer(src);
    });

    // Load `src` into the hidden buffer, wait for it to actually start
    // painting, then swap which buffer is on top. The previously-active
    // buffer stays frozen on its last frame during the swap, so the
    // hardware-overlay tear-down never shows through.
    function playOnIdleBuffer(src) {
      const next = idleBuf;
      const prev = active;

      next.src = src;
      next.currentTime = 0;
      next.muted = false;

      const promote = () => {
        next.classList.remove('idle');
        next.classList.add('active');
        prev.classList.remove('active');
        prev.classList.add('idle');
        active = next;
        idleBuf = prev;
        // Stop the old one a beat later so its last frame is still on
        // screen until the new one is fully composited.
        setTimeout(() => { try { prev.pause(); } catch(_) {} }, 150);
      };

      const startPlayback = () => {
        const p = next.play();
        if (p && p.then) {
          p.then(promote).catch(() => {
            // Autoplay rejected — fall back to muted and try again.
            next.muted = true;
            next.play().then(promote).catch(() => promote());
          });
        } else {
          promote();
        }
      };

      // Wait until the next buffer has enough data to render its first
      // frame; otherwise promoting it would itself show a blank frame.
      if (next.readyState >= 2) {       // HAVE_CURRENT_DATA
        startPlayback();
      } else {
        const onReady = () => {
          next.removeEventListener('loadeddata', onReady);
          next.removeEventListener('canplay',    onReady);
          startPlayback();
        };
        next.addEventListener('loadeddata', onReady);
        next.addEventListener('canplay',    onReady);
        try { next.load(); } catch(_) {}
      }
    }

    // Allow operator to unmute / fullscreen with a click or key.
    document.addEventListener('click', () => {
      active.muted = false;
      if (document.fullscreenElement == null && document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(()=>{});
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'f') document.documentElement.requestFullscreen().catch(()=>{});
      if (e.key === 'm') active.muted = !active.muted;
    });
  </script>
</body>
</html>
