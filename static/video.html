<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Charlock — Video</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
  html, body { background:#000; margin:0; padding:0; height:100%; overflow:hidden; cursor:none; }
  #vid { width:100vw; height:100vh; object-fit:contain; background:#000; }
  #status { position:fixed; bottom:6px; right:10px; color:#333; font:11px monospace; }
  #logo-screen {
    position:fixed; inset:0; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    background: radial-gradient(ellipse at center, #1a0d3a 0%, #05010f 70%, #000 100%);
    color:#f4d77a; font-family: 'Cinzel', 'Trajan Pro', Georgia, serif;
    text-align:center;
  }
  #logo-screen.show { display:flex; }
  #logo-screen .magi { font-size: 9vw; font-style: italic; font-weight: 700;
    background: linear-gradient(180deg, #ffe9a8 0%, #d4a23a 50%, #8a5a18 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 40px rgba(212,162,58,0.35);
    letter-spacing: 0.04em;
    line-height: 1;
  }
  #logo-screen .quest { font-size: 9vw; font-weight: 400;
    color:#e7e2cc; letter-spacing: 0.18em; margin-top: -1vw;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    line-height: 1;
  }
  #logo-screen .tag { margin-top: 2.5vw; font-size: 1.4vw; color:#a89b6a;
    letter-spacing:0.5em; text-transform:uppercase;
  }
</style>
</head>
<body>
  <video id="vid" autoplay muted playsinline></video>
  <!-- Hidden pool of <video> elements, one per clip. Each is set to
       preload="auto" so the browser fetches and decodes the file up front.
       When the UI asks us to play a clip we copy its src into the visible
       player, which the browser can serve straight from cache. -->
  <div id="preload-pool" aria-hidden="true"
       style="position:fixed; width:0; height:0; overflow:hidden; opacity:0; pointer-events:none;"></div>
  <div id="logo-screen" class="show">
    <div class="magi">MagiQuest</div>
    <div class="quest">ENCOUNTERS</div>
    <div class="tag">choose your adventure</div>
  </div>
  <div id="status">video screen</div>

  <script src="/static/js/socket.io.min.js"></script>
  <script>
    // The video page is a dumb client. It only:
    //   - plays whatever video the UI tells it to play
    //   - reports when the current clip ends
    //
    // Important: <video> autoplay is unmuted on a kiosk display, but most
    // browsers require the page itself to load with `muted` attribute first
    // and then we unmute on first interaction or after socket connect.

    const vid    = document.getElementById('vid');
    const status = document.getElementById('status');
    const logo   = document.getElementById('logo-screen');
    const pool   = document.getElementById('preload-pool');
    const MENU_SENTINEL = '__menu__';

    // ---------------- preload pool ----------------
    //
    // Fetch the server-side manifest of every clip and preload each one with
    // a hidden <video preload="auto">. This warms both the HTTP cache (long
    // Cache-Control) and the browser's media buffer, so play() on any clip
    // starts essentially instantly.
    //
    // We preload with a small concurrency limit so we don't saturate the
    // Pi's network/disk on startup.

    const PRELOAD_CONCURRENCY = 3;
    const preloaded = new Map();   // url -> <video> element

    function makePreloader(url) {
      const v = document.createElement('video');
      v.preload     = 'auto';
      v.muted       = true;
      v.playsInline = true;
      v.src         = url;
      pool.appendChild(v);
      preloaded.set(url, v);
      return v;
    }

    function waitReady(v) {
      return new Promise((resolve) => {
        if (v.readyState >= 4) return resolve();           // HAVE_ENOUGH_DATA
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          v.removeEventListener('canplaythrough', finish);
          v.removeEventListener('loadeddata',     finish);
          v.removeEventListener('error',          finish);
          resolve();
        };
        v.addEventListener('canplaythrough', finish);
        v.addEventListener('loadeddata',     finish);
        v.addEventListener('error',          finish);
        // Hard timeout so one slow/broken file doesn't stall the queue.
        setTimeout(finish, 30000);
        try { v.load(); } catch(_) {}
      });
    }

    async function preloadAll() {
      let manifest;
      try {
        const r = await fetch('/manifest', { cache: 'no-store' });
        manifest = await r.json();
      } catch (e) {
        console.warn('preload: manifest fetch failed', e);
        return;
      }
      const clips = (manifest && manifest.clips) || [];
      status.textContent = 'video screen — preloading 0/' + clips.length;

      let done = 0;
      const queue = clips.slice();
      async function worker() {
        while (queue.length) {
          const c = queue.shift();
          const v = makePreloader(c.url);
          await waitReady(v);
          done++;
          status.textContent =
            'video screen — preloading ' + done + '/' + clips.length;
        }
      }
      const workers = [];
      for (let i = 0; i < PRELOAD_CONCURRENCY; i++) workers.push(worker());
      await Promise.all(workers);
      status.textContent = 'video screen — ready (' + clips.length + ' clips)';
      console.log('[preload] complete:', clips.length, 'clips');
    }

    function showLogo() {
      logo.classList.add('show');
      try { vid.pause(); } catch(_) {}
      vid.removeAttribute('src');
      vid.load();
    }
    function hideLogo() { logo.classList.remove('show'); }

    // Start on the logo screen until UI tells us otherwise.
    showLogo();

    // Kick off background preload of every clip.
    preloadAll();

    const socket = io();

    socket.on('connect', () => {
      status.textContent = 'video screen — connected';
    });
    socket.on('disconnect', () => {
      status.textContent = 'video screen — disconnected';
    });

    socket.on('change_video', (data) => {
      const src = data && data.src;
      if (!src || src === MENU_SENTINEL) { showLogo(); return; }
      hideLogo();
      // If we have a preloaded element for this src, prime its data into the
      // visible player by reusing the same URL (browser HTTP cache will
      // serve it instantly) and seeking to 0.
      const pre = preloaded.get(src);
      if (pre && pre.readyState >= 2) {
        try { pre.pause(); pre.currentTime = 0; } catch(_) {}
      }
      // Always restart, even if it's the same source.
      vid.src = src;
      vid.currentTime = 0;
      vid.muted = false;
      const p = vid.play();
      if (p && p.catch) {
        p.catch(() => {
          vid.muted = true;
          vid.play().catch(()=>{});
        });
      }
    });

    vid.addEventListener('ended', () => {
      const src = vid.src;
      socket.emit('video_ended', { src });
    });

    // Allow operator to unmute / fullscreen with a click or key.
    document.addEventListener('click', () => {
      vid.muted = false;
      if (document.fullscreenElement == null && document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(()=>{});
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'f') document.documentElement.requestFullscreen().catch(()=>{});
      if (e.key === 'm') vid.muted = !vid.muted;
    });
  </script>
</body>
</html>
